<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Region Taxi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
        }
        .container { 
            width: 90%; max-width: 420px; padding: 30px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 28px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }
        h2 { font-weight: 300; letter-spacing: 3px; color: var(--gold); margin-bottom: 30px; text-transform: uppercase; }
        
        /* Кнопки выбора роли */
        .main-btn { 
            width: 100%; padding: 20px; margin: 12px 0; border-radius: 14px; border: none; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn-gold { background: var(--gold); color: black; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

        /* Формы и сетки */
        .section { display: none; text-align: left; }
        .section.active { display: block; }
        .label { font-size: 11px; color: #777; text-transform: uppercase; margin: 15px 0 8px 5px; display: block; letter-spacing: 1px; }
        
        input { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); border-radius: 12px; color: white; 
            font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); }

        /* Направления */
        .route-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .route-item { 
            background: rgba(255,255,255,0.04); padding: 12px; border-radius: 10px; 
            text-align: center; cursor: pointer; border: 1px solid transparent; font-size: 13px; transition: 0.2s;
        }
        .route-item.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); }

        /* Выбор пассажиров */
        .pass-selector { display: flex; justify-content: space-between; margin-top: 5px; }
        .pass-btn { 
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50%; 
            cursor: pointer; transition: 0.3s; color: #888;
        }
        .pass-btn.active { background: var(--gold); color: black; border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* Список заказов */
        .order-card { 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; 
            margin-bottom: 12px; border-left: 3px solid var(--gold);
        }
        .call-btn { 
            display: block; background: #28a745; color: white; text-align: center; 
            text-decoration: none; padding: 12px; border-radius: 10px; margin-top: 10px; font-weight: bold;
        }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #555; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-main" class="section active">
        <h2>Такси Алматы-Қорам-Шелек</h2>
        <button class="main-btn btn-gold" onclick="show('screen-passenger')">Жолаушы (Пассажир)</button>
        <button class="main-btn btn-outline" onclick="show('screen-driver')">Жүргізуші (Водитель)</button>
    </div>

    <div id="screen-passenger" class="section">
        <h2 style="font-size: 18px;">Тапсырыс беру</h2>
        
        <span class="label">Бағытты таңдаңыз:</span>
        <div class="route-grid">
            <div class="route-item active" onclick="setR('Алматы - Қорам', this)">Алматы - Қорам</div>
            <div class="route-item" onclick="setR('Қорам - Алматы', this)">Қорам - Алматы</div>
            <div class="route-item" onclick="setR('Алматы - Шелек', this)">Алматы - Шелек</div>
            <div class="route-item" onclick="setR('Шелек - Алматы', this)">Шелек - Алматы</div>
            <div class="route-item" onclick="setR('Қорам - Шелек', this)">Қорам - Шелек</div>
            <div class="route-item" onclick="setR('Шелек - Қорам', this)">Шелек - Қорам</div>
            <div class="route-item" style="grid-column: span 2;" onclick="setR('Басқа', this)">Басқа бағыт...</div>
        </div>
        <input type="text" id="customRoute" placeholder="Қайдан? Қайда?" style="display:none; margin-top:10px;">

        <span class="label">Атыңыз бен Телефоныңыз:</span>
        <input type="text" id="name" placeholder="Есіміңіз" style="margin-bottom: 10px;">
        <input type="tel" id="phone" placeholder="8 7XX XXX XX XX">

        <span class="label">Адам саны:</span>
        <div class="pass-selector">
            <div class="pass-btn active" onclick="setP(1, this)">1</div>
            <div class="pass-btn" onclick="setP(2, this)">2</div>
            <div class="pass-btn" onclick="setP(3, this)">3</div>
            <div class="pass-btn" onclick="setP(4, this)">4</div>
            <div class="pass-btn" onclick="setP(5, this)">5</div>
            <div class="pass-btn" onclick="setP(6, this)">6</div>
        </div>

        <span class="label">Уақыты:</span>
        <input type="time" id="time">

        <button class="main-btn btn-gold" style="margin-top:25px;" onclick="send()">ТАПСЫРЫС БЕРУ</button>
        <span class="back-link" onclick="show('screen-main')">← Артқа қайту</span>
    </div>

    <div id="screen-driver" class="section">
        <h2 style="font-size: 18px;">Белсенді тапсырыстар</h2>
        <div id="orders-list">Загрузка...</div>
        <span class="back-link" onclick="show('screen-main')">← Басты бетке</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jgngutjzewogolzpopqt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_kE0YDikrGftHwZXfMovSJw_7aMAIoFU';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let route = "Алматы - Қорам";
    let passengers = 1;

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-driver') load();
    }

    function setR(val, el) {
        route = val;
        document.querySelectorAll('.route-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('customRoute').style.display = (val === 'Басқа') ? 'block' : 'none';
    }

    function setP(val, el) {
        passengers = val;
        document.querySelectorAll('.pass-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    async function send() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        const t = document.getElementById('time').value;
        const finalR = (route === 'Басқа') ? document.getElementById('customRoute').value : route;

        if(!n || !p || !t || !finalR) return alert("Толтырыңыз!");

        const { error } = await client.from('orders').insert([{ 
            name: n, route_from: finalR, route_to: '', passengers, time: t, phone: p 
        }]);

        if (error) alert(error.message);
        else { alert("Сәтті! Тапсырыс қабылданды."); location.reload(); }
    }

    async function load() {
        const { data } = await client.from('orders').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('orders-list');
        list.innerHTML = data.length ? "" : "Тапсырыстар жоқ";
        data.forEach(o => {
            list.innerHTML += `
                <div class="order-card">
                    <div style="color:var(--gold); font-size:12px; font-weight:600;">${o.route_from}</div>
                    <div style="margin:5px 0; font-size:16px;"><b>${o.name}</b> — ${o.passengers} адам</div>
                    <div style="color:#666; font-size:13px;">Уақыты: ${o.time}</div>
                    <a href="tel:${o.phone}" class="call-btn">📞 ҚОҢЫРАУ</a>
                </div>`;
        });
    }

    document.getElementById('time').value = "12:00";
</script>
</body>
</html>
