<!DOCTYPE html>
<html lang="kk" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>ҚОРАМ-ШЕЛЕК ТАКСИ | MAINTENANCE</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        html, body { 
            width: 100%; 
            min-height: 100vh; 
            margin: 0; 
            padding: 0; 
            background: var(--dark); 
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
        }

        .lang-picker {
            margin: 40px 0 20px 0;
            display: flex; gap: 15px; background: var(--glass);
            padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border);
        }
        .lang-btn { cursor: pointer; opacity: 0.4; transition: 0.3s; font-size: 14px; font-weight: 600; color: white; }
        .lang-btn.active { opacity: 1; color: var(--gold); transform: scale(1.1); }

        .container { 
            width: 85%; max-width: 380px; 
            padding: 40px 25px; 
            background: var(--glass);
            backdrop-filter: blur(15px); 
            border-radius: 32px; 
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 30px; /* Төменгі жақпен арақашықтық */
        }

        .logo-wrapper {
            width: 85px; height: 85px; margin: 0 auto 30px auto;
            background: #000; border-radius: 24px; padding: 8px;
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
        }
        .main-logo { width: 100%; height: auto; border-radius: 14px; }

        .maintenance-icon { font-size: 45px; margin-bottom: 25px; display: block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        h2 { font-weight: 600; letter-spacing: 1px; color: var(--gold); margin: 0 0 20px 0; text-transform: uppercase; font-size: 1.1rem; }
        p { font-size: 15px; color: #ccc; line-height: 1.7; margin: 0 0 30px 0; }
        
        .copyright { font-size: 13px; color: #555; display: block; margin-bottom: 30px; }

        .admin-link {
            display: inline-block; padding: 14px 35px; border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; border-radius: 16px;
            font-size: 14px; font-weight: 600; transition: 0.3s;
            margin-bottom: 20px; /* Келесі блокпен арасы */
        }

        .donation-box { 
            margin-top: 20px;
            padding: 25px 20px; 
            background: rgba(212, 175, 55, 0.03); 
            border-radius: 24px; 
            border: 1px dashed rgba(212, 175, 55, 0.2);
        }
        
        .support-label { 
            font-size: 10px; color: var(--gold); font-weight: 600; 
            display: block; margin-bottom: 15px; letter-spacing: 1.5px;
        }

        .card-number { 
            display: block; font-size: 18px; color: #eee; 
            margin-bottom: 12px; font-family: monospace; 
            letter-spacing: 2px; cursor: pointer; 
        }

        .copy-hint { 
            font-size: 9px; text-transform: uppercase; 
            opacity: 0.6; display: block; color: #888;
        }

        .footer-credits { margin: 20px 0 40px 0; font-size: 12px; color: #444; }
    </style>
</head>
<body>

<div class="lang-picker">
    <div class="lang-btn active" onclick="setLang('kk', this)">KZ</div>
    <div class="lang-btn" onclick="setLang('ru', this)">RU</div>
    <div class="lang-btn" onclick="setLang('en', this)">EN</div>
    <div class="lang-btn" onclick="setLang('ug', this)">УЙҒ</div>
</div>

<div class="container">
    <div class="logo-wrapper"><img src="logo.png" alt="TAXI" class="main-logo"></div>
    <span class="maintenance-icon">🛠️</span>
    <h2 id="t-maint-title">Техникалық жұмыстар</h2>
    <p id="t-maint-desc">
        Жүйе жаңартылуда. Уақытша қолайсыздықтар үшін кешірім сұраймыз. Жақын арада қайта жұмыс істейміз!
    </p>
    
    <span class="copyright">© Тлепберген Қуаныш, 2026</span>

    <a href="https://wa.me/+77479416498" class="admin-link" id="t-admin">Администратор</a>

    <div class="donation-box">
        <span id="t-support" class="support-label">ЖОБА АВТОРЫНА ҚОЛДАУ:</span>
        <span class="card-number" onclick="copyCard()">4400 4303 8692 1370</span>
        <span id="copyStatus" class="copy-hint">КӨШІРУ ҮШІН НӨМІРДІ БАСЫҢЫЗ</span>
    </div>
</div>

<div class="footer-credits">Almaty-Qoram-Shelek Taxi Service</div>

<script>
    const i18n = {
        kk: {
            title: "Техникалық жұмыстар",
            desc: "Жүйе жаңартылуда. Уақытша қолайсыздықтар үшін кешірім сұраймыз. Жақын арада қайта жұмыс істейміз!",
            admin: "Администратор",
            support: "ЖОБА АВТОРЫНА ҚОЛДАУ:",
            copy: "КӨШІРУ ҮШІН НӨМІРДІ БАСЫҢЫЗ",
            copied: "КӨШІРІЛДІ! РАХМЕТ!"
        },
        ru: {
            title: "Технические работы",
            desc: "Система обновляется. Просим прощения за временные неудобства. Скоро всё заработает!",
            admin: "Администратор",
            support: "ПОДДЕРЖКА АВТОРА ПРОЕКТА:",
            copy: "НАЖМИТЕ НА НОМЕР, ЧТОБЫ СКОПИРОВАТЬ",
            copied: "СКОПИРОВАНО! СПАСИБО!"
        },
        en: {
            title: "Maintenance",
            desc: "System is being updated. We apologize for the temporary inconvenience. We will be back online shortly!",
            admin: "Administrator",
            support: "SUPPORT THE PROJECT AUTHOR:",
            copy: "CLICK THE NUMBER TO COPY",
            copied: "COPIED! THANK YOU!"
        },
        ug: {
            title: "Техникилиқ ишлар",
            desc: "Система йеңилиниватиду. Вақтидин келишмәсликләр үшін кечүрүм сораймиз. Йеқин арида ишлаймиз!",
            admin: "Администратор",
            support: "ЙОЛИНИҢ АВТОРИҒА ЧӘЙ-ПУЛ:",
            copy: "КӨЧИРИШ ҮЧҮН НОМУНИ БЕСИҢ",
            copied: "КӨЧИРИЛДИ! РӘХМӘТ!"
        }
    };

    let currentLang = 'kk';

    function setLang(lang, el) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        const t = i18n[lang];
        document.getElementById('t-maint-title').innerText = t.title;
        document.getElementById('t-maint-desc').innerText = t.desc;
        document.getElementById('t-admin').innerText = t.admin;
        document.getElementById('t-support').innerText = t.support;
        document.getElementById('copyStatus').innerText = t.copy;
    }

    function copyCard() {
        navigator.clipboard.writeText("4400430386921370").then(() => {
            const status = document.getElementById('copyStatus');
            status.innerText = i18n[currentLang].copied;
            status.style.color = "#D4AF37";
            setTimeout(() => { 
                status.innerText = i18n[currentLang].copy; 
                status.style.color = "#888";
            }, 3000);
        });
    }
</script>
</body>
</html>
