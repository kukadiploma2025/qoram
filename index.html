<!DOCTYPE html>
<html lang="kk" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>ҚОРАМ-ШЕЛЕК ТАКСИ</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--dark); 
            color: white; 
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; /* iPhone үшін маңызды */
            background-image: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Тіл таңдау - iPhone челкасына тимейді */
        .lang-picker {
            margin: 20px 0;
            display: flex; gap: 15px; background: var(--glass);
            padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border);
            z-index: 100;
        }
        .lang-btn { cursor: pointer; opacity: 0.5; transition: 0.3s; font-size: 16px; font-weight: 700; padding: 5px 10px; }
        .lang-btn.active { opacity: 1; color: var(--gold); transform: scale(1.1); }

        .container { 
            width: 92%; max-width: 420px; padding: 25px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 28px; border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;
        }

        .logo-wrapper { width: 80px; height: 80px; margin: 0 auto 15px auto; background: #000; border-radius: 20px; padding: 5px; border: 1px solid var(--border); }
        .main-logo { width: 100%; height: auto; border-radius: 12px; }

        .section { display: none; }
        .section.active { display: block; }
        
        .main-btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

        input { width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 10px; outline: none; }

        /* Свайп дизайны */
        .order-wrapper { position: relative; overflow: hidden; margin-bottom: 12px; border-radius: 16px; transition: transform 0.3s ease; }
        .order-card { 
            background: #161616; padding: 15px; position: relative; z-index: 2;
            border-left: 4px solid var(--gold); transition: transform 0.3s;
        }
        .delete-bg {
            position: absolute; right: 0; top: 0; bottom: 0; width: 100%;
            background: #ff4757; display: flex; align-items: center; justify-content: flex-end;
            padding-right: 20px; color: white; font-weight: bold; z-index: 1; border-radius: 16px;
        }

        /* Обновить батырмасы */
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .refresh-btn { background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; transition: 0.5s; }
        .refresh-btn.rotating { transform: rotate(360deg); }

        .footer { padding: 30px 0; text-align: center; color: #555; font-size: 12px; }
    </style>
</head>
<body>

<div class="lang-picker">
    <div class="lang-btn active" onclick="setLang('kk', this)">КЗ</div>
    <div class="lang-btn" onclick="setLang('ru', this)">РУ</div>
    <div class="lang-btn" onclick="setLang('en', this)">EN</div>
</div>

<div class="container">
    <div id="screen-main" class="section active">
        <div class="logo-wrapper"><img src="logo.png" class="main-logo"></div>
        <h2 id="t-title">ҚОРАМ-ШЕЛЕК ТАКСИ</h2>
        <button class="main-btn btn-gold" onclick="show('screen-passenger')">Жолаушы</button>
        <button class="main-btn btn-outline" onclick="show('screen-login')">Жүргізуші</button>
    </div>

    <div id="screen-passenger" class="section">
        <h3 id="t-order-title">Тапсырыс беру</h3>
        <input type="text" id="name" placeholder="Есіміңіз">
        <input type="tel" id="phone" placeholder="87071112233">
        <input type="time" id="time" value="12:00">
        <button class="main-btn btn-gold" onclick="send()">ЖІБЕРУ</button>
        <p onclick="show('screen-main')" style="cursor:pointer; color:#555">← Артқа</p>
    </div>

    <div id="screen-login" class="section">
        <h3>Кіру</h3>
        <input type="tel" id="d-phone" placeholder="Номер">
        <input type="password" id="d-pin" placeholder="PIN" maxlength="4">
        <button class="main-btn btn-gold" onclick="login()">КІРУ</button>
        <p onclick="show('screen-main')" style="cursor:pointer; color:#555">← Артқа</p>
    </div>

    <div id="screen-driver" class="section">
        <div id="welcome-card" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 20px;">
            <div id="welcome-msg" style="color: var(--gold); font-weight: bold;">Сәлем!</div>
            <div id="weather-info" style="font-size: 11px; color: #888; margin-top: 5px;">📍 Локация анықталуда...</div>
        </div>

        <div class="list-header">
            <h3 id="t-list-title" style="margin:0">Тапсырыстар</h3>
            <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">🔄</button>
        </div>
        <div id="orders-list"></div>
        <p onclick="location.reload()" style="cursor:pointer; color:#555; margin-top:20px;">← Шығу</p>
    </div>
</div>

<div class="footer">
    <p>© Тлепберген Қуаныш, 2026</p>
</div>

<script>
    const SUPABASE_URL = 'https://jgngutjzewogolzpopqt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_kE0YDikrGftHwZXfMovSJw_7aMAIoFU';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let startX = 0;
    let deletedOrders = JSON.parse(localStorage.getItem('deleted_orders') || '[]');

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function login() {
        const p = document.getElementById('d-phone').value;
        const pin = document.getElementById('d-pin').value;
        const { data } = await client.from('drivers').select('*').eq('phone', p).eq('pin', pin).eq('is_active', true).single();
        if (data) {
            document.getElementById('welcome-msg').innerText = `Сәлем, ${data.name}!`;
            show('screen-driver');
            getWeather();
            refreshData();
        } else alert("Қате!");
    }

    // ЛОКАЦИЯ БОЙЫНША АУА РАЙЫ
    function getWeather() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const w = await res.json();
                document.getElementById('weather-info').innerText = `📍 Сіздің маңыңызда: ${Math.round(w.current_weather.temperature)}°C | Сәтті сапар!`;
            } catch { document.getElementById('weather-info').innerText = "📍 Ауа райы белгісіз"; }
        }, () => {
            document.getElementById('weather-info').innerText = "📍 Геолокация өшірулі";
        });
    }

    async function refreshData() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('rotating');
        await loadOrders();
        setTimeout(() => btn.classList.remove('rotating'), 500);
    }

    async function loadOrders() {
        const { data } = await client.from('orders').select('*').order('created_at', { ascending: false }).limit(20);
        const list = document.getElementById('orders-list');
        list.innerHTML = "";
        
        data.forEach(o => {
            if (deletedOrders.includes(o.id)) return;

            const card = document.createElement('div');
            card.className = 'order-wrapper';
            card.innerHTML = `
                <div class="delete-bg">Өшіру</div>
                <div class="order-card" id="card-${o.id}" 
                    touchstart="handleStart(event)" 
                    touchmove="handleMove(event, '${o.id}')" 
                    touchend="handleEnd(event, '${o.id}')">
                    <div style="font-size:14px; font-weight:bold">${o.name} (${o.passengers} адам)</div>
                    <div style="font-size:12px; color:#888">${o.route_from} | ${o.time}</div>
                    <div style="margin-top:10px; display:flex; gap:5px;">
                        <button onclick="window.location.href='tel:${o.phone}'" style="flex:1; background:var(--gold); border:none; padding:8px; border-radius:8px; font-size:12px; font-weight:bold">Қоңырау</button>
                    </div>
                </div>
            `;
            
            // Свайп оқиғаларын тіркеу
            const cardEl = card.querySelector('.order-card');
            cardEl.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            cardEl.addEventListener('touchmove', e => {
                let diff = startX - e.touches[0].clientX;
                if (diff > 0) cardEl.style.transform = `translateX(-${diff}px)`;
            });
            cardEl.addEventListener('touchend', e => {
                let diff = startX - e.changedTouches[0].clientX;
                if (diff > 100) {
                    hideOrder(o.id);
                } else {
                    cardEl.style.transform = `translateX(0)`;
                }
            });

            list.appendChild(card);
        });
    }

    function hideOrder(id) {
        deletedOrders.push(id);
        localStorage.setItem('deleted_orders', JSON.stringify(deletedOrders));
        refreshData();
    }

    async function send() {
        const n = document.getElementById('name').value;
        const p = document.getElementById('phone').value;
        const t = document.getElementById('time').value;
        if(!n || !p) return alert("Толтырыңыз!");
        await client.from('orders').insert([{ name: n, phone: p, time: t, route_from: 'Алматы-Қорам' }]);
        alert("Жіберілді!");
        location.reload();
    }

    function setLang(lang, el) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        // Тіл ауыстыру логикасын осында жалғастыруға болады
    }
</script>
</body>
</html>
