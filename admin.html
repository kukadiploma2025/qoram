<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Qoram Taxi | Admin Panel</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Taxi Admin">
    <link rel="apple-touch-icon" href="logo.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #0a0a0a;
            --card: #161616;
        }

        /* Запрет выделения текста для эффекта приложения */
        * { -webkit-tap-highlight-color: transparent; -webkit-user-select: none; box-sizing: border-box; }
        input { -webkit-user-select: text; }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--dark); 
            color: white; 
            padding: env(safe-area-inset-top) 20px 40px 20px; /* Отступы под челку iPhone */
            margin: 0; 
            background-image: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
            min-height: 100vh;
        }
        .wrapper { max-width: 500px; margin: 40px auto; padding: 20px; }
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 24px; 
            border: 1px solid #222; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            backdrop-filter: blur(10px);
        }
        h2 { color: var(--gold); font-size: 18px; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; text-align: center; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: #202020; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none; 
        }
        input:focus { border-color: var(--gold); }
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--gold); 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            color: #000; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #222; 
        }
        .remove-btn { 
            background: rgba(255, 107, 107, 0.1); 
            color: #ff6b6b; 
            padding: 8px 12px; 
            font-size: 12px; 
            border-radius: 10px; 
            border: none; 
            cursor: pointer; 
        }
        .info-label { font-size: 11px; color: #555; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .date-label { font-size: 10px; color: #444; margin-top: 4px; }
    </style>
</head>
<body>

    <div id="gate" class="wrapper">
        <div class="card" style="text-align: center;">
            <div style="font-size: 40px; margin-bottom: 10px;">🔑</div>
            <h2>Admin Access</h2>
            <p style="color: #666; font-size: 14px;">Введите пароль</p>
            <input type="password" id="pass-input" placeholder="Пароль">
            <button onclick="verify()">Connect</button>
        </div>
    </div>

    <div id="main-view" class="wrapper" style="display:none;">
        <h2>База водителей</h2>
        
        <div class="card">
            <div class="info-label">Добавить нового водителя</div>
            <input type="tel" id="new-phone" placeholder="87071112233">
            <input type="text" id="new-pin" placeholder="PIN код (4 цифры)" maxlength="4">
            <button onclick="addDriver()">+ Тіркеу</button>
        </div>

        <div class="card">
            <div class="info-label">Список активных доступов</div>
            <div id="drivers-list">Загрузка...</div>
        </div>
        
        <button onclick="location.reload()" style="background: transparent; color: #444; border: 1px solid #222;">Выйти из системы</button>
    </div>

<script>
    const SB_URL = 'https://jgngutjzewogolzpopqt.supabase.co'.trim();
    const SB_KEY = 'sb_publishable_kE0YDikrGftHwZXfMovSJw_7aMAIoFU'.trim();
    const db = supabase.createClient(SB_URL, SB_KEY);

    function verify() {
        const input = document.getElementById('pass-input').value.trim();
        if(input === "kuka2005") {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            loadDrivers();
        } else {
            alert("Ошибка: Неверный пароль!");
            document.getElementById('pass-input').value = '';
        }
    }

    async function addDriver() {
        const p = document.getElementById('new-phone').value.trim();
        const n = document.getElementById('new-pin').value.trim();
        if(!p || !n) return alert("Заполните все поля!");

        const { error } = await db.from('drivers').insert([{ phone: p, pin: n }]);
        if(error) {
            alert("Ошибка! Проверьте данные.");
        } else {
            document.getElementById('new-phone').value = '';
            document.getElementById('new-pin').value = '';
            loadDrivers();
        }
    }

    async function loadDrivers() {
        const listDiv = document.getElementById('drivers-list');
        const { data, error } = await db.from('drivers').select('*').order('created_at', { ascending: false });
        
        if(error) {
            listDiv.innerHTML = "Ошибка: " + error.message;
            return;
        }
        
        listDiv.innerHTML = data.length ? "" : "Водителей нет";
        data.forEach(item => {
            // Форматируем дату
            const d = new Date(item.created_at);
            const dateStr = d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});

            listDiv.innerHTML += `
                <div class="item">
                    <div>
                        <div style="font-weight: bold; color: #D4AF37; font-size: 16px;">${item.phone}</div>
                        <div style="font-size: 12px; color: #888;">PIN: ${item.pin}</div>
                        <div class="date-label">Добавлен: ${dateStr}</div>
                    </div>
                    <button class="remove-btn" onclick="deleteDriver('${item.phone}')">Удалить</button>
                </div>`;
        });
    }

    async function deleteDriver(phone) {
        if(!confirm("Удалить доступ для " + phone + "?")) return;
        const { error } = await db.from('drivers').delete().eq('phone', phone);
        if(error) alert("Ошибка при удалении");
        else loadDrivers();
    }

    document.getElementById('pass-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verify();
    });
</script>
</body>
</html>
